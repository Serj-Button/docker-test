version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - todo-data:/data
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    networks:
      - todo-network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - todo-network

volumes:
  todo-data:
    driver: local

networks:
  todo-network:
    driver: bridge