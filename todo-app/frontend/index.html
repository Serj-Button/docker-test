<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellow Todo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 YELLOW TODO</h1>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Что нужно сделать?">
            <button id="addBtn">+</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="active">Активные</button>
            <button class="tab-btn" data-tab="completed">Выполненные</button>
        </div>
        
        <div id="activeTasks" class="tasks-grid">
            <!-- Активные задачи будут здесь -->
        </div>
        
        <div id="completedTasks" class="tasks-grid hidden">
            <!-- Выполненные задачи будут здесь -->
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
